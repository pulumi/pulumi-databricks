provider: databricks
major-version: 1
esc:
  enabled: true
env:
  DATABRICKS_USERNAME: ${{ secrets.DATABRICKS_USERNAME }}
  DATABRICKS_PASSWORD: ${{ secrets.DATABRICKS_PASSWORD}}
  DATABRICKS_ACCOUNT_ID: ${{ secrets.DATABRICKS_ACCOUNT_ID}}
  DATABRICKS_HOST: https://accounts.cloud.databricks.com
providerDefaultBranch: main
makeTemplate: bridged
# TestNoDebugLogsOnStartup loads the built provider plugin from ./bin, so the
# fanout test_provider job must build the provider first. See pulumi/ci-mgmt#2336.
testProviderNeedsProviderBinary: true
allowMissingDocs: true
pulumiConvert: 1
registryDocs: true
license:
  ignore:
    - github.com/databricks/terraform-provider-databricks/shim
